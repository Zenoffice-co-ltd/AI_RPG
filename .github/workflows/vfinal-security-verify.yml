name: vfinal-security-verify

on:
  pull_request:
    paths:
      - "apps/web/app/api/grok-first-vFinal/**"
      - "apps/web/app/demo/adecco-roleplay-vFinal/**"
      - "apps/web/apphosting.vfinal.yaml"
      - "apps/web/lib/grok-first-roleplay/**"
      - "apps/web/components/roleplay/GrokFirstV50RoleplayPage.tsx"
      - "apps/web/components/roleplay/GrokFirstV50RoleplayShell.tsx"
      - "apps/xai-realtime-relay/**"
      - "packages/grok-first-roleplay-config/**"
      - "packages/grok-realtime-relay-auth/**"
      - "scripts/check-vfinal-security-invariants.mjs"
      - "scripts/check-vfinal-submission-dod-status.mjs"
      - "scripts/deploy-adecco-roleplay-gcloud.mjs"
      - "scripts/grok-first-vfinal-browser-e2e.mjs"
      - "scripts/grok-first-vfinal-latency-compare.mjs"
      - "docs/security/adecco-ai-roleplay-final-security-closeout.md"
      - "docs/security/adecco-vfinal-approval-packet.md"
      - "docs/security/adecco-vfinal-workbook-human-confirmation-cell-map.md"
      - "docs/security/adecco-vfinal-blocker-inventory-index.md"
      - "docs/security/adecco-vfinal-submitted-url-decision-inventory.md"
      - "docs/security/adecco-vfinal-legacy-xai-scope-inventory.md"
      - "docs/security/adecco-vfinal-latency-baseline-candidate-assessment.md"
      - "docs/security/adecco-vfinal-acceptance-blocker-inventory.md"
      - "docs/security/adecco-vfinal-customer-submission-dod-audit.md"
      - "docs/security/adecco-vfinal-questionnaire-submission-map.md"
      - ".agents/skills/ai-rpg-acceptance-verification/SKILL.md"
      - "docs/DELIVERY_STATUS.md"
      - "docs/OPERATIONS.md"
      - "package.json"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.1
      - name: Install deps
        run: pnpm install --frozen-lockfile
      - name: vFinal server/client boundary invariant
        run: pnpm grok:vfinal-security-invariants
      - name: vFinal customer submission DoD status guard
        run: pnpm grok:vfinal-submission-dod-status
      - name: vFinal customer submission DoD status guard self-test
        run: pnpm grok:vfinal-submission-dod-status:self-test
      - name: vFinal latency comparison self-test
        run: pnpm grok:first-vfinal:latency-compare -- --self-test
      - name: vFinal targeted unit tests
        run: |
          pnpm --filter @top-performer/web test -- tests/unit/grok-first-vfinal.test.ts
          pnpm --filter @top-performer/xai-realtime-relay test -- src/server.test.ts
          pnpm --filter @top-performer/grok-realtime-relay-auth test
