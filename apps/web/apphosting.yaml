runConfig:
  cpu: 1
  memoryMiB: 1024
  minInstances: 0
  maxInstances: 2
env:
  - variable: APP_BASE_URL
    value: https://adecco-roleplay--adecco-mendan.asia-east1.hosted.app
    availability:
      - BUILD
      - RUNTIME
  - variable: GCLOUD_LOCATION
    value: asia-northeast1
    availability:
      - BUILD
      - RUNTIME
  - variable: SECRET_SOURCE_PROJECT_ID
    value: zapier-transfer
    availability:
      - BUILD
      - RUNTIME
  - variable: CLOUD_TASKS_QUEUE_ANALYZE
    value: session-analysis
    availability:
      - RUNTIME
  - variable: CLOUD_TASKS_QUEUE_REGION
    value: asia-northeast1
    availability:
      - RUNTIME
  - variable: ENABLE_ELEVEN_WEBHOOKS
    value: "false"
    availability:
      - RUNTIME
  - variable: LIVEAVATAR_SANDBOX
    value: "true"
    availability:
      - RUNTIME
  - variable: DEFAULT_ELEVEN_MODEL
    value: gpt-5-mini
    availability:
      - RUNTIME
  - variable: OPENAI_ANALYSIS_MODEL
    value: gpt-5.4
    availability:
      - RUNTIME
  - variable: OPENAI_MINING_MODEL
    value: gpt-5-mini
    availability:
      - RUNTIME
  # Runtime project must be an Adecco-owned app/data project.
  # Do not point this at the secret-source project zapier-transfer.
  - variable: FIREBASE_PROJECT_ID
    value: adecco-mendan
    availability:
      - BUILD
      - RUNTIME
  - variable: QUEUE_SHARED_SECRET
    secret: QUEUE_SHARED_SECRET
  - variable: ADMIN_BASIC_AUTH_USER
    secret: ADMIN_BASIC_AUTH_USER
  - variable: ADMIN_BASIC_AUTH_PASS
    secret: ADMIN_BASIC_AUTH_PASS
  - variable: DEFAULT_ELEVEN_VOICE_ID
    secret: DEFAULT_ELEVEN_VOICE_ID
  # ElevenLabs ConvAI runtime config (was missing from apphosting.yaml — caused
  # /api/voice/session-token to throw "Voice session server environment is not
  # configured." which surfaced to the UI as "セッションの開始に失敗しました").
  - variable: ELEVENLABS_AGENT_ID
    value: "agent_2801kpj49tj1f43sr840cvy17zcc"
    availability:
      - RUNTIME
  - variable: ELEVENLABS_BRANCH_ID
    value: "agtbrch_9701kpj49vbdepjr8szvwc6w7e6b"
    availability:
      - RUNTIME
  - variable: ELEVENLABS_ENVIRONMENT
    value: "production"
    availability:
      - RUNTIME
  - variable: ELEVENLABS_API_KEY
    secret: ELEVENLABS_API_KEY
  # Haiku-Fish A/B backend (re-enabled — secrets ANTHROPIC_API_KEY,
  # FISH_API_KEY, FISH_ADECCO_VOICE_REFERENCE_ID are now provisioned in
  # adecco-mendan with full SA bindings).
  - variable: ENABLE_HAIKU_FISH_ROLEPLAY
    value: "true"
    availability:
      - RUNTIME
  # Lane B (microphone → GCP Speech-to-Text v2 → Claude → Fish Audio) enabled.
  # Speech-to-Text API is enabled in adecco-mendan and the App Hosting SA has
  # roles/speech.client. Recognition latency is bounded — STT runs synchronously
  # per utterance (RMS-based VAD on the client triggers the request).
  - variable: ENABLE_HAIKU_FISH_MIC_INPUT
    value: "true"
    availability:
      - RUNTIME
  - variable: GOOGLE_CLOUD_PROJECT
    value: adecco-mendan
    availability:
      - RUNTIME
  - variable: GOOGLE_CLOUD_LOCATION
    value: global
    availability:
      - RUNTIME
  - variable: GOOGLE_STT_LANGUAGE
    value: ja-JP
    availability:
      - RUNTIME
  - variable: GOOGLE_STT_MODEL
    value: latest_short
    availability:
      - RUNTIME
  - variable: HAIKU_FISH_LLM_MODEL
    value: claude-haiku-4-5-20251001
    availability:
      - RUNTIME
  - variable: HAIKU_FISH_LLM_TEMPERATURE
    value: "0.2"
    availability:
      - RUNTIME
  - variable: HAIKU_FISH_LLM_MAX_TOKENS
    value: "220"
    availability:
      - RUNTIME
  - variable: FISH_TTS_MODEL
    value: s2-pro
    availability:
      - RUNTIME
  - variable: FISH_TTS_FORMAT
    value: wav
    availability:
      - RUNTIME
  - variable: FISH_TTS_SAMPLE_RATE
    value: "24000"
    availability:
      - RUNTIME
  - variable: ANTHROPIC_API_KEY
    secret: ANTHROPIC_API_KEY
  - variable: FISH_API_KEY
    secret: FISH_API_KEY
  - variable: FISH_ADECCO_VOICE_REFERENCE_ID
    secret: FISH_ADECCO_VOICE_REFERENCE_ID
  # Grok Voice Think Fast 1.0 A/B backend (gated by ENABLE_GROK_VOICE_ROLEPLAY).
  # Existing ElevenLabs / Haiku-Fish routes are unaffected.
  - variable: ENABLE_GROK_VOICE_ROLEPLAY
    value: "true"
    availability:
      - RUNTIME
  - variable: GROK_VOICE_MODEL
    value: "grok-voice-think-fast-1.0"
    availability:
      - RUNTIME
  - variable: GROK_VOICE_VOICE_ID
    value: "99c95cc8a177"
    availability:
      - RUNTIME
  - variable: GROK_VOICE_INPUT_FORMAT
    value: "audio/pcm"
    availability:
      - RUNTIME
  - variable: GROK_VOICE_OUTPUT_FORMAT
    value: "audio/pcm"
    availability:
      - RUNTIME
  - variable: GROK_VOICE_SAMPLE_RATE
    value: "24000"
    availability:
      - RUNTIME
  - variable: GROK_VOICE_REALTIME_BASE
    value: "wss://api.x.ai/v1/realtime"
    availability:
      - RUNTIME
  - variable: GROK_VOICE_EPHEMERAL_BASE
    value: "https://api.x.ai/v1/realtime/client_secrets"
    availability:
      - RUNTIME
  - variable: GROK_VOICE_TURN_DETECTION_THRESHOLD
    value: "0.5"
    availability:
      - RUNTIME
  - variable: GROK_VOICE_TURN_DETECTION_SILENCE_MS
    value: "500"
    availability:
      - RUNTIME
  - variable: GROK_VOICE_DEBUG_TRANSCRIPT_PREVIEW_ENABLED
    value: "true"
    availability:
      - RUNTIME
  - variable: GROK_VOICE_DEBUG_TRANSCRIPT_PREVIEW_MAX_CHARS
    value: "4000"
    availability:
      - RUNTIME
  # Verified Audio Artifact deterministic mode (PR #92 / PR-93).
  # When true, production plays ONLY sha256-verified registered speech PCM artifacts:
  #   - no rt_voice audio playback (realtime output_audio.delta hard-dropped)
  #   - no runtime locked / sanitized / greeting TTS (fetchers throw before HTTP)
  #   - unknown / repeat / rapid-fire are handled by registered fallback artifacts
  #   - WS URL is pinned to ?model=grok-voice-think-fast-1.0 via builder
  #   - session.update tools.length is forced to 0
  # Rollback: set to "false" and re-deploy. Reverts to legacy PR60 lock path
  # within one request (no client redeploy needed). DOD is asserted by
  # `pnpm grok:audio-e2e:prod-log-assert --minutes 30 --json out/cl_assert_prod.json`.
  - variable: GROK_VOICE_PRODUCTION_DETERMINISTIC_ONLY
    value: "true"
    availability:
      - RUNTIME
  - variable: XAI_API_KEY
    secret: XAI_API_KEY
  # Demo access gate token (existing secret stored as `demo-access-token` in
  # adecco-mendan; maps to `DEMO_ACCESS_TOKEN` env var consumed by
  # apps/web/lib/roleplay/auth.ts and the assertion in *RoleplayPage.tsx).
  - variable: DEMO_ACCESS_TOKEN
    secret: demo-access-token
